# _data/departments.yml
# Single source of truth for the How We Work interactive and wiki chatbot corpus.
#
# Consumed by:
#   - onboarding/how-we-work.md  (Liquid jsonify → window.ORG_DATA → org-viz.js)
#   - scripts/build_corpus.py    (augments the how-we-work corpus entry for the chatbot)
#
# Rendering-only data (colors, SVG positions) remains in assets/js/org-viz.js.

