name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - "chatbot-worker/src/**"
      - "chatbot-worker/wrangler.toml"
      - "chatbot-worker/package.json"
      - "chatbot-worker/package-lock.json"
      - "chatbot-worker/tsconfig.json"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.CHATBOT_ENABLED == 'true' }}
    defaults:
      run:
        working-directory: chatbot-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: chatbot-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: npx wrangler deploy
