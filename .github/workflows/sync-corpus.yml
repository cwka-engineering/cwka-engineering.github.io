name: Sync Wiki Corpus to Cloudflare KV

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "scripts/build_corpus.py"
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    # Only run if the Cloudflare secrets are configured
    if: ${{ vars.CHATBOT_ENABLED == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build corpus
        run: python scripts/build_corpus.py --out corpus.json --prompt-text

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Upload corpus to Cloudflare KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          wrangler kv key put \
            --namespace-id="${{ secrets.CF_KV_NAMESPACE_ID }}" \
            --remote \
            "wiki-corpus-prompt" \
            --path=corpus_prompt.txt
