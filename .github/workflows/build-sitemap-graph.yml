name: Build Sitemap Graph

on:
  push:
    branches: [main]
    paths:
      - "**.md"
      - "scripts/build_sitemap.py"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sitemap graph
        run: python scripts/build_sitemap.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/sitemap-graph.json
          git diff --cached --quiet || git commit -m "Update sitemap graph data [skip ci]"
          git push
