name = "cwka-wiki-chatbot"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[[kv_namespaces]]
binding = "WIKI_CORPUS"
id = "7b65b0b3e73e4608b0b29a412682c585"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "457771cd577e47778a0e833100429156"

# Secrets (set via: npx wrangler secret put <NAME>)
# - CHAT_ANTHROPIC_API_KEY        (/api/chat)
# - DIAGNOSTIC_ANTHROPIC_API_KEY  (/api/diagnostic, /api/summarize)
# - DIAGNOSTIC_AUTH_TOKEN
# - PA_AUTH_TOKEN
# - PARTS_MATCH_ANTHROPIC_API_KEY  (/api/parts-match)

[vars]
ALLOWED_ORIGIN = "https://cwka-engineering.github.io"
CLAUDE_MODEL = "claude-haiku-4-5-20251001"
MAX_REQUESTS_PER_MINUTE = "20"
PA_CLAUDE_MODEL = "claude-haiku-4-5-20251001"
